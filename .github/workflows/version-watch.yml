name: Version Watch

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-valkey:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare baseline to upstream
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASELINE: "9.0.3"
        run: |
          latest=$(gh api repos/valkey-io/valkey/releases/latest --jq '.tag_name')
          latest="${latest#v}"
          echo "baseline=${BASELINE} latest=${latest}"

          if [ -z "$latest" ]; then
            echo "could not fetch latest release" >&2
            exit 1
          fi

          if [ "$latest" = "$BASELINE" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # $latest > $BASELINE ?
          newer=$(printf '%s\n%s\n' "$latest" "$BASELINE" | sort -V | tail -1)
          if [ "$newer" = "$BASELINE" ]; then
            # baseline is newer or equal; nothing to do
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"

      - name: Skip if issue already open
        if: steps.check.outputs.up_to_date == 'false'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh issue list --label version-update --state open --json number --jq 'length')
          echo "open=${count}" >> "$GITHUB_OUTPUT"

      - name: Open issue
        if: steps.check.outputs.up_to_date == 'false' && steps.existing.outputs.open == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST: ${{ steps.check.outputs.latest }}
        run: |
          gh issue create \
            --title "Valkey upstream ${LATEST} available" \
            --label version-update \
            --body "valkey-io/valkey has released ${LATEST}. Current skill baseline is 9.0.3.

          Review the release notes for behavior/API changes, update affected skill content, and bump the \`BASELINE\` in \`.github/workflows/version-watch.yml\` when done."
