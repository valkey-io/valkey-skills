name: agnix lint

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.agnix.toml'
      - '.codex-plugin/**'
      - '.claude-plugin/**'
      - '**/.codex-plugin/**'
      - '**/.claude-plugin/**'
      - '**/plugin.json'
  pull_request:
    paths:
      - 'skills/**'
      - '.agnix.toml'
      - '.codex-plugin/**'
      - '.claude-plugin/**'
      - '**/.codex-plugin/**'
      - '**/.claude-plugin/**'
      - '**/plugin.json'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install agnix
        run: |
          curl -fsSL https://github.com/agent-sh/agnix/releases/latest/download/agnix-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Run agnix
        run: agnix . --strict
